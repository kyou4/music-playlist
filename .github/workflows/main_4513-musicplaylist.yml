name: Build and deploy ASP.Net Core app to Azure Web App - 4513-musicplaylist

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Debug - see file structure
      - name: List files
        run: |
          ls -la
          find . -name "*.csproj"
          find . -name "*.sln"

      # Build React Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./musicplaylist.client

      - name: Build frontend
        run: npm run build
        working-directory: ./musicplaylist.client

      # Build .NET Backend
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore ./MusicPlaylist.Server/MusicPlaylist.Server.csproj

      - name: Build with dotnet
        run: dotnet build ./MusicPlaylist.Server/MusicPlaylist.Server.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ./MusicPlaylist.Server/MusicPlaylist.Server.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2B8622D9856A4F758DE53A57516936B5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5A06D495F1CF492A86A35592BD651619 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EEDC354A5FBB4D9ABD652627D1EBFA46 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: '4513-musicplaylist'
          slot-name: 'Production'
          package: .